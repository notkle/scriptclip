<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1814" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>overeasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --yolk: #F2A61D;
      --yolk-dark: #C4820D;
      --yolk-light: rgba(242,166,29,0.12);
      --bg: #1A1814;
      --bg2: #232018;
      --bg3: #2C2822;
      --card: #272320;
      --shell: #F0EDE6;
      --muted: #7A7670;
      --border: rgba(240,237,230,0.07);
      --border-med: rgba(240,237,230,0.13);
      --measure: #E8724A;
      --timer: #5B9BD5;
      --sensory: #4DB88A;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; max-height: 100%; overflow: hidden; position: fixed; width: 100%; background: var(--bg); color: var(--shell); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .app { width: 100%; max-width: 430px; margin: 0 auto; height: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* header */
    .header { padding: calc(14px + var(--safe-top)) 20px 14px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Fraunces', serif; font-weight: 300; font-size: 22px; letter-spacing: -0.5px; color: var(--shell); }
    .logo span { color: var(--yolk); }

    /* screens */
    .screen { display: none; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .screen.active { display: flex; }

    /* home */
    .home-hero { padding: 40px 24px 28px; text-align: center; animation: fadeUp 0.4s ease both; }
    .home-hero h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 32px; line-height: 1.18; margin-bottom: 10px; color: var(--shell); }
    .home-hero h1 em { font-style: italic; color: var(--yolk); }
    .home-hero p { font-size: 14px; color: var(--muted); line-height: 1.65; }

    .paste-box { margin: 0 20px 10px; display: flex; flex-direction: column; gap: 10px; animation: fadeUp 0.4s 0.05s ease both; }
    .paste-box textarea { width: 100%; background: var(--card); border: 1px solid var(--border-med); border-radius: 16px; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--shell); resize: none; outline: none; line-height: 1.6; transition: border-color 0.15s; min-height: 180px; }
    .paste-box textarea:focus { border-color: var(--yolk); }
    .paste-box textarea::placeholder { color: var(--muted); }
    .go-btn { width: 100%; background: var(--yolk); border: none; border-radius: 11px; color: #1A1814; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 13px 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: background 0.15s, transform 0.1s; }
    .go-btn i { font-size: 16px; }
    .go-btn:active { background: var(--yolk-dark); transform: scale(0.98); }
    .go-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .error-msg { margin: 0 20px 10px; background: rgba(226,75,74,0.12); border: 0.5px solid rgba(226,75,74,0.3); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #F09595; display: none; line-height: 1.5; }
    .error-msg.visible { display: block; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 20px 16px; animation: fadeUp 0.4s 0.1s ease both; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border-med); }
    .divider span { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .demo-cards { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; padding-bottom: calc(28px + var(--safe-bottom)); animation: fadeUp 0.4s 0.12s ease both; }
    .demo-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .demo-card:active { border-color: var(--yolk); background: var(--yolk-light); }
    .demo-card-emoji { font-size: 30px; flex-shrink: 0; line-height: 1; }
    .demo-card-info { flex: 1; min-width: 0; }
    .demo-card-info strong { font-size: 14px; font-weight: 500; display: block; margin-bottom: 3px; color: var(--shell); }
    .demo-card-info span { font-size: 12px; color: var(--muted); }
    .demo-card .ti { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    /* loading */
    .loading-screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 40px 20px; }
    .loading-screen.active { display: flex; }
    .egg-spin { width: 56px; height: 56px; border: 2.5px solid var(--border-med); border-top-color: var(--yolk); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { text-align: center; }
    .loading-text p { font-size: 15px; color: var(--shell); margin-bottom: 4px; }
    .loading-text span { font-size: 13px; color: var(--muted); }

    /* recipe screen */
    .recipe-screen { }

    /* hero banner */
    .recipe-banner {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg3);
    }
    .recipe-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .recipe-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,24,20,0.95) 0%, rgba(26,24,20,0.5) 50%, rgba(26,24,20,0.1) 100%);
    }
    .recipe-banner-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 20px 16px;
    }
    .recipe-banner-back {
      position: absolute;
      top: calc(12px + var(--safe-top));
      left: 16px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: rgba(240,237,230,0.8);
      cursor: pointer;
      background: rgba(26,24,20,0.5);
      border: none;
      border-radius: 20px;
      padding: 6px 12px 6px 8px;
      font-family: 'DM Sans', sans-serif;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .recipe-banner-back i { font-size: 15px; }
    .recipe-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 24px;
      line-height: 1.2;
      color: #FFFFFF;
      margin-bottom: 8px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    .recipe-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .recipe-meta span { font-size: 12px; color: rgba(240,237,230,0.75); display: flex; align-items: center; gap: 4px; }
    .recipe-meta i { font-size: 13px; }
    .stars { color: var(--yolk); }

    /* no-image fallback header */
    .recipe-header-plain { padding: 20px 20px 0; }
    .recipe-back-plain { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 18px; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; }
    .recipe-title-plain { font-family: 'Fraunces', serif; font-weight: 300; font-size: 26px; line-height: 1.2; margin-bottom: 10px; color: var(--shell); }
    .recipe-meta-plain { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .recipe-meta-plain span { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; }

    .source-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; margin: 14px 20px 0; }
    .source-pill.schema { background: rgba(77,184,138,0.15); color: #4DB88A; }
    .source-pill.jina { background: rgba(91,155,213,0.15); color: #5B9BD5; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 16px 20px 0; margin-bottom: 4px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 16px 20px 10px; }

    /* ingredients */
    .ingredients-bar { margin: 0 20px 4px; background: var(--card); border-radius: 14px; overflow: hidden; border: 0.5px solid var(--border); }
    .ing-header { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .ing-header span { font-size: 14px; font-weight: 500; color: var(--shell); }
    .ing-header i { font-size: 16px; color: var(--muted); transition: transform 0.22s ease; }
    .ing-header.open i { transform: rotate(180deg); }
    .ing-list { display: none; padding: 0 16px 14px; }
    .ing-list.open { display: block !important; }
    .ing-item { display: flex; gap: 10px; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--border); color: var(--shell); }
    .ing-item:last-child { border-bottom: none; }
    .ing-qty { color: var(--measure); font-weight: 500; min-width: 80px; flex-shrink: 0; }

    /* steps */
    .steps-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(40px + var(--safe-bottom)); }
    .step-card-base { background: var(--card); border: 0.5px solid var(--border); border-radius: 18px; overflow: hidden; }
    .step-main { padding: 15px 17px; }
    .step-num { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; display: flex; align-items: center; }
    .depth-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yolk); margin-left: auto; flex-shrink: 0; }
    .step-brief { font-size: 15px; line-height: 1.6; color: var(--shell); }
    .step-brief .measure { color: var(--measure); font-weight: 500; }
    .step-brief .timer { color: var(--timer); font-weight: 500; }
    .step-brief .sensory { color: var(--sensory); font-style: italic; }
    .step-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 11px; }
    .step-tag { font-size: 11px; font-weight: 500; padding: 4px 9px; border-radius: 20px; }
    .step-tag.time { background: rgba(91,155,213,0.15); color: #5B9BD5; }
    .step-tag.temp { background: rgba(232,114,74,0.15); color: #E8724A; }
    .step-tag.check { background: rgba(77,184,138,0.15); color: #4DB88A; }
    .drawer-toggle { width: 100%; border: none; background: var(--bg2); border-top: 0.5px solid var(--border); padding: 10px 17px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); }
    .drawer-toggle i { font-size: 14px; transition: transform 0.22s ease; }
    .drawer-toggle.open i { transform: rotate(180deg); }
    .step-original { display: none; padding: 13px 17px 15px; font-size: 13px; line-height: 1.72; color: var(--muted); border-top: 0.5px solid var(--border); background: var(--bg2); font-style: italic; }
    .step-original.open { display: block; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* card flip */
    .step-card { perspective: 1000px; }
    .step-card-inner, #cook-card-inner { position: relative; transform-style: preserve-3d; transition: transform 0.45s ease; min-height: 120px; }
    .step-card-inner.flipped, #cook-card-inner.flipped { transform: rotateY(180deg); }
    .step-card-front, .step-card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      background: var(--card);
      border: 0.5px solid var(--border);
    }
    .step-card-back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
      padding: 15px 17px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .step-card-back .back-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .step-card-back .back-ing {
      font-size: 13px;
      color: var(--shell);
      padding: 5px 0;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .step-card-back .back-ing:last-child { border-bottom: none; }
    .step-card-back .back-qty { color: var(--measure); font-weight: 500; min-width: 80px; flex-shrink: 0; }
    .flip-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .flip-btn .logo-mini { font-family: 'Fraunces', serif; font-weight: 300; font-size: 12px; color: var(--yolk); }

    /* nav bar */
    .nav-bar { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 calc(10px + var(--safe-bottom)); background: var(--bg); border-top: 0.5px solid var(--border); position: sticky; bottom: 0; z-index: 100; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 4px 16px; font-family: "DM Sans", sans-serif; }
    .nav-btn i { font-size: 22px; color: var(--muted); transition: color 0.15s; }
    .nav-btn span { font-size: 10px; color: var(--muted); transition: color 0.15s; }
    .nav-btn.active i, .nav-btn.active span { color: var(--yolk); }

    /* shopping list */
    .shop-header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .shop-header h2 { font-family: "Fraunces", serif; font-weight: 300; font-size: 24px; color: var(--shell); }
    .shop-clear { background: none; border: 0.5px solid var(--border-med); border-radius: 8px; color: var(--muted); font-family: "DM Sans", sans-serif; font-size: 12px; padding: 6px 12px; cursor: pointer; }
    .shop-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .shop-empty i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--border-med); }
    .aisle-group { margin: 0 20px 20px; }
    .aisle-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .aisle-label::after { content: ""; flex: 1; height: 0.5px; background: var(--border); }
    .shop-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: opacity 0.2s; }
    .shop-item.checked { opacity: 0.35; }
    .shop-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-med); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
    .shop-item.checked .shop-check { background: var(--yolk); border-color: var(--yolk); }
    .shop-item.checked .shop-check::after { content: ""; width: 5px; height: 9px; border: 2px solid #1A1814; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
    .shop-item-name { font-size: 14px; color: var(--shell); flex: 1; }
    .shop-item.checked .shop-item-name { text-decoration: line-through; color: var(--muted); }
    .shop-add-btn { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px dashed var(--border-med); border-radius: 12px; color: var(--muted); font-family: "DM Sans", sans-serif; font-size: 13px; padding: 10px 14px; cursor: pointer; margin: 0 20px 12px; width: calc(100% - 40px); justify-content: center; }

    /* saved recipes */
    .saved-header { padding: 20px 20px 16px; }
    .saved-header h2 { font-family: "Fraunces", serif; font-weight: 300; font-size: 24px; color: var(--shell); }
    .saved-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .saved-empty i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--border-med); }
    .saved-cards { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; padding-bottom: calc(28px + var(--safe-bottom)); }
    .saved-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
    .saved-card:active { border-color: var(--yolk); }
    .saved-card-info { flex: 1; min-width: 0; }
    .saved-card-info strong { font-size: 14px; font-weight: 500; color: var(--shell); display: block; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-card-info span { font-size: 12px; color: var(--muted); }
    .saved-card-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; font-size: 18px; flex-shrink: 0; }

    /* recipe action bar */
    .recipe-actions { display: flex; gap: 8px; padding: 12px 20px 0; }
    .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; color: var(--muted); font-family: "DM Sans", sans-serif; font-size: 12px; font-weight: 500; padding: 10px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .action-btn:active { border-color: var(--yolk); color: var(--yolk); }
    .action-btn i { font-size: 15px; }
    .action-btn.saved { border-color: var(--yolk); color: var(--yolk); }

  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- base -->
          <rect x="9" y="24" width="10" height="2" rx="1" fill="#F2A61D"/>
          <!-- pole -->
          <rect x="13.5" y="8" width="1" height="16" rx="0.5" fill="#F2A61D"/>
          <!-- beam - tipped slightly -->
          <rect x="4" y="10" width="20" height="1.5" rx="0.75" fill="#F0EDE6" transform="rotate(-8 14 10.75)"/>
          <!-- left pan -->
          <path d="M5 12.5 Q5 16 9 16 Q13 16 13 12.5" stroke="#F0EDE6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- right pan - higher (lighter side) -->
          <path d="M15 10 Q15 13.5 19 13.5 Q23 13.5 23 10" stroke="#F0EDE6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- pivot -->
          <circle cx="14" cy="8.5" r="1.5" fill="#F2A61D"/>
        </svg>
        <div>
          <div class="logo">over<span>easy</span></div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.04em;margin-top:1px;">a Pestle companion app</div>
        </div>
      </div>
    </div>

    <div class="screen active" id="home-screen">
      <div class="home-hero">
        <h1>recipes,<br><em>actually easy.</em></h1>
        <p>paste any recipe below — we'll organize,<br>colorize, and simplify it instantly.</p>
      </div>
      <div class="paste-box">
        <textarea id="recipe-input" placeholder="paste your recipe here...&#10;&#10;title, ingredients, steps — any format is fine." rows="10" spellcheck="false"></textarea>
        <button class="go-btn" id="go-btn" onclick="handlePaste()">
          <i class="ti ti-sparkles"></i> make it easy
        </button>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="loading-screen" id="loading-screen">
      <div class="egg-spin"></div>
      <div class="loading-text">
        <p id="loading-msg">fetching recipe...</p>
        <span id="loading-sub">this usually takes 10–15 seconds</span>
      </div>
    </div>

    <div class="screen" id="recipe-screen">
      <div id="recipe-top"></div>
      <div id="source-pill-wrap"></div>

      <div class="section-label" style="padding-top:4px">ingredients</div>
      <div class="ingredients-bar">
        <div class="ing-header" id="ing-header" onclick="toggleIngredients()">
          <span>show ingredients</span>
          <i class="ti ti-chevron-down"></i>
        </div>
        <div class="ing-list" id="ing-list"></div>
      </div>
      <div class="section-label">steps</div>
      <div class="steps-list" id="steps-list"></div>
    </div>
    <!-- shop screen -->
    <div class="screen" id="shop-screen">
      <div class="shop-header">
        <h2>shopping list</h2>
        <div style="display:flex;gap:8px;">
          <button class="shop-clear" onclick="clearChecked()">remove checked</button>
          <button class="shop-clear" onclick="clearAll()" style="color:#F09595;border-color:rgba(240,149,149,0.3)">clear all</button>
        </div>
      </div>
      <div id="shop-content"></div>
    </div>

    <!-- saved screen -->
    <div class="screen" id="saved-screen">
      <div class="saved-header"><h2>saved recipes</h2></div>
      <div class="saved-cards" id="saved-cards"></div>
    </div>

    <!-- nav bar -->
    <div class="nav-bar" id="nav-bar">
      <button class="nav-btn active" id="nav-home" onclick="showTab('home')">
        <i class="ti ti-chef-hat" aria-hidden="true"></i>
        <span>recipes</span>
      </button>
      <button class="nav-btn" id="nav-saved" onclick="showTab('saved')">
        <i class="ti ti-bookmark" aria-hidden="true"></i>
        <span>saved</span>
      </button>
      <button class="nav-btn" id="nav-shop" onclick="showTab('shop')">
        <i class="ti ti-shopping-cart" aria-hidden="true"></i>
        <span>shopping</span>
      </button>
    </div>
  </div>

  <!-- cook mode overlay -->
  <div id="cook-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:300;max-width:430px;margin:0 auto;flex-direction:column;">
    <div style="padding:calc(14px + var(--safe-top)) 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;">
      <div style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);" id="cook-step-label">step 1 of 8</div>
      <button onclick="closeCookMode()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-family:sans-serif;display:flex;align-items:center;gap:4px;"><i class="ti ti-x" style="font-size:16px"></i></button>
    </div>
    <div id="cook-body" onclick="cookBodyTap(event)" style="flex:1;padding:32px 28px 20px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;overflow-y:auto;min-height:0;"></div>
    <div id="cook-drawers" style="flex-shrink:0;"></div>
    <div style="padding:16px 28px calc(16px + var(--safe-bottom));display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid var(--border);flex-shrink:0;">
      <button onclick="cookPrev()" id="cook-prev" style="background:var(--card);border:0.5px solid var(--border);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:20px;"><i class="ti ti-arrow-left"></i></button>
      <div id="cook-dots" style="display:flex;gap:6px;"></div>
      <button onclick="cookNext()" id="cook-next" style="background:var(--yolk);border:none;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1A1814;font-size:20px;"><i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <script>
    const WORKER = 'https://overeasy.sotempyhehe.workers.dev';

    const PROMPT = `You are the step-compression engine for overeasy, a cooking app built around one philosophy: compress the container, never the content.

INPUT FORMAT:
The recipe text may be markdown with section headers (### Step One, ### Rise, etc.) and numbered lists. Ignore all section headers — treat every numbered item across all sections as a sequential step in order. Strip any blogger intro text, tips sections, or footnotes that aren't part of the actual instructions.

YOUR MISSION:
Transform verbose recipe steps into the shortest possible instruction that loses nothing a cook actually needs. Every measurement, temperature, time, technique, and sensory cue must survive. What gets cut: filler words, repeated context, blogger commentary, hedging language, redundant explanations.

BRIEF WRITING RULES:
- Write in direct imperative voice. "Whisk eggs" not "You'll want to whisk the eggs together."
- Cut anything that isn't an action, a quantity, a time, a temp, or a sensory cue.
- If a step has multiple distinct actions, use a period to separate them. Do not combine into one run-on.
- Never drop a measurement, temperature, or doneness test — these are sacred.
- Sensory cues ("golden brown", "slightly tacky", "hollow sound") are as important as measurements — keep every one.
- Strip filler: "feel free to", "you can also", "make sure to", "it's important that", "at this point", "go ahead and", "simply", "just", "basically", "now".
- If a step includes a test (poke test, windowpane test, toothpick test) — keep it, compress to one sentence max.
- Maximum 2 sentences for simple steps. 3 sentences only if the step genuinely has 3 distinct required actions.

COLOR CODING — wrap in these exact HTML spans:
- Measurements/quantities/temps: <span class="measure">...</span> e.g. 2 cups, 350°F, 1 tsp
- Times/durations: <span class="timer">...</span> e.g. 5 minutes, 1–2 hours
- Sensory/doneness cues: <span class="sensory">...</span> e.g. golden brown, slightly tacky, doubled in size

TAGS — extract only what exists in the step, do not invent:
- { "type": "time", "label": "X min" } for any timed action
- { "type": "temp", "label": "350°F" } for any oven or pan temperature
- { "type": "check", "label": "short name" } for any doneness test or visual check

hasDepth = true if the original step contained meaningful detail beyond what fits in the brief (tips, tests, troubleshooting, explanations).

INGREDIENTS — parse qty and name cleanly. qty = amount + unit only. name = ingredient name only, no amounts.

Extract image URL if present in the text, otherwise empty string.
Extract title, total time, yield/servings from the text header if present.
Rating and ratingCount will usually not be in pasted text — leave as empty string if absent.

Respond ONLY with valid JSON, no markdown fences, no explanation, no preamble:
{
  "title": "...",
  "rating": "...",
  "ratingCount": "...",
  "time": "...",
  "yield": "...",
  "image": "...",
  "ingredients": [
    { "qty": "...", "name": "..." }
  ],
  "steps": [
    {
      "brief": "...html with spans...",
      "original": "...verbatim original step text...",
      "hasDepth": true,
      "tags": [
        { "type": "time|temp|check", "label": "..." }
      ]
    }
  ]
}`;


    const log = (msg, data, color='#F2A61D') => data !== undefined
      ? console.log('%c[overeasy] ' + msg, `color:${color};font-weight:bold`, data)
      : console.log('%c[overeasy] ' + msg, `color:${color};font-weight:bold`);
    const err = (msg, data) => data !== undefined
      ? console.error('%c[overeasy ERROR] ' + msg, 'color:red;font-weight:bold', data)
      : console.error('%c[overeasy ERROR] ' + msg, 'color:red;font-weight:bold');

    async function handlePaste() {
      const text = document.getElementById('recipe-input').value.trim();
      if (!text) { showError('paste a recipe first'); return; }
      hideError();
      document.getElementById('go-btn').disabled = true;
      showLoading('making it easy...', 'usually takes 10–15 seconds');
      log('sending pasted text to worker');
      try {
        const payload = { text, prompt: PROMPT };
        log('PAYLOAD TEXT LENGTH: ' + text.length);
        log('PAYLOAD PROMPT LENGTH: ' + PROMPT.length);
        log('PAYLOAD KEYS: ' + Object.keys(payload).join(', '));

        const res = await fetch(WORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        log('WORKER HTTP STATUS: ' + res.status);

        const rawText = await res.text();
        log('RAW RESPONSE LENGTH: ' + rawText.length);
        log('RAW RESPONSE BODY: ' + rawText.slice(0, 500));

        let data;
        try {
          data = JSON.parse(rawText);
          log('PARSED OK — keys: ' + Object.keys(data).join(', '));
          if (data.error) {
            log('ERROR FIELD: ' + data.error);
            log('RAW FIELD: ' + (data.raw || '(empty)'));
          }
        } catch (e) {
          err('JSON PARSE FAILED: ' + e.message);
          err('RAW WAS: ' + rawText.slice(0, 300));
          throw new Error('non-JSON: ' + rawText.slice(0, 200));
        }
        if (!res.ok || data.error) { err('worker error', data); throw new Error(data.error || 'worker error'); }
        log('RECIPE RECEIVED — title: ' + data.recipe?.title);
        log('STEP COUNT: ' + (data.recipe?.steps?.length || 0));
        renderRecipe(data.recipe, data.source);
      } catch (e) {
        err('catch:', e.message);
        hideLoading();
        showError('something went wrong — (' + e.message + ')');
        document.getElementById('go-btn').disabled = false;
      }
    }

    function showLoading(msg, sub) {
      document.getElementById('loading-msg').textContent = msg;
      document.getElementById('loading-sub').textContent = sub;
      ['home-screen','recipe-screen','shop-screen','saved-screen'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById('loading-screen').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loading-screen').classList.remove('active');
      showTab('home');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    function renderRecipe(data, source) {
      const image = data.image || '';
      currentRecipe = data;
      const topEl = document.getElementById('recipe-top');

      if (image) {
        topEl.innerHTML = `
          <div class="recipe-banner">
            <img src="${image}" alt="${data.title||''}" onerror="this.parentElement.style.display='none'" />
            <div class="recipe-banner-overlay"></div>
            <button class="recipe-banner-back" onclick="goHome()">
              <i class="ti ti-arrow-left"></i> back
            </button>
            <div class="recipe-banner-content">
              <div class="recipe-title">${data.title||'untitled recipe'}</div>
              <div class="recipe-meta" id="recipe-meta"></div>
            </div>
          </div>`;
      } else {
        topEl.innerHTML = `
          <div class="recipe-header-plain">
            <button class="recipe-back-plain" onclick="goHome()">
              <i class="ti ti-arrow-left"></i> back
            </button>
            <div class="recipe-title-plain">${data.title||'untitled recipe'}</div>
            <div class="recipe-meta-plain" id="recipe-meta"></div>
          </div>`;
      }

      let meta = '';
      if (data.rating) meta += `<span><span class="stars">★</span> ${data.rating}${data.ratingCount ? ' (' + data.ratingCount + ')' : ''}</span>`;
      if (data.time) meta += `<span><i class="ti ti-clock"></i> ${data.time}</span>`;
      if (data.yield) meta += `<span><i class="ti ti-users"></i> ${data.yield}</span>`;
      const metaEl = document.getElementById('recipe-meta');
      if (metaEl) metaEl.innerHTML = meta;

      const pillWrap = document.getElementById('source-pill-wrap');
      const isSaved = getSavedRecipes().some(r => r.title === data.title);
      pillWrap.innerHTML = `<div class="recipe-actions">
        <button class="action-btn" onclick="startCookMode()">
          <i class="ti ti-player-play"></i> cook mode
        </button>
        <button class="action-btn ${isSaved ? 'saved' : ''}" id="save-btn" onclick="toggleSave()">
          <i class="ti ti-bookmark"></i> ${isSaved ? 'saved' : 'save'}
        </button>
        <button class="action-btn" onclick="openShopFromRecipe()">
          <i class="ti ti-shopping-cart"></i> shop
        </button>
      </div>`;

      document.getElementById('ing-list').innerHTML = (data.ingredients || []).map(i =>
        `<div class="ing-item"><span class="ing-qty">${i.qty||''}</span><span>${i.name||''}</span></div>`
      ).join('');

      const ingHeader = document.getElementById('ing-header');
      ingHeader.classList.add('open');
      ingHeader.querySelector('span').textContent = 'hide ingredients';
      document.getElementById('ing-list').classList.add('open');

      const steps = data.steps || [];
      const allIngredients = data.ingredients || [];

      document.getElementById('steps-list').innerHTML = steps.map((step, idx) => {
        const tags = '';
        const dot = step.hasDepth ? `<span class="depth-dot"></span>` : '';

        // extract only the orange measure-tagged words from this step's brief
        const measureMatches = [...(step.brief||'').matchAll(/<span class="measure">([^<]+)<\/span>/g)];
        const measureText = measureMatches.map(m => m[1].toLowerCase()).join(' ');
        const measureWords = measureText.split(/[\s,.()\/]+/).filter(w => w.length >= 3);
        const stepIngs = measureWords.length > 0
          ? allIngredients.filter(i => {
              const name = i.name.toLowerCase()
                .replace(/,.*$/, '')
                .replace(/\(.*?\)/g, '')
                .replace(/\b(fresh|dried|chopped|minced|sliced|diced|grated|shredded|cooked|uncooked|whole|large|small|medium|extra|lean|boneless|skinless|unsalted|salted|softened|melted|divided|optional|virgin|store-bought|instant|active|dry|granulated|powdered|packed|pure|light|dark|unbleached|all-purpose)\b/g, '')
                .replace(/\s+/g, ' ').trim();
              const ingWords = name.split(/\s+/).filter(w => w.length >= 3);
              return ingWords.some(w => measureWords.some(mw => mw.includes(w) || w.includes(mw)));
            })
          : [];
                const ingRows = stepIngs.length > 0
          ? stepIngs.map(i => `<div class="back-ing"><span class="back-qty">${i.qty||''}</span><span>${i.name||''}</span></div>`).join('')
          : `<div style="font-size:13px;color:var(--muted);padding:8px 0">no specific ingredients listed for this step</div>`;

        return `<div class="step-card" style="background:transparent;border:none;">
          <div class="step-card-inner" id="card-inner-${idx}">
            <div class="step-card-front">
              <div class="step-main">
                <div class="step-num">
                  <button class="flip-btn" style="width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border-med);display:flex;align-items:center;justify-content:center;background:var(--bg2);flex-shrink:0;" onclick="flipCard(${idx})" aria-label="show measurements">
                    <i class="ti ti-scale" style="font-size:14px;color:var(--measure)"></i>
                  </button>
                  <span style="margin-left:auto">step ${idx+1} of ${steps.length}${dot}</span>
                </div>
                <div class="step-brief">${step.brief||''}</div>
                ${tags ? `<div class="step-tags">${tags}</div>` : ''}
              </div>
              <button class="drawer-toggle" onclick="toggleStep(this)">
                <span>original notes</span>
                <i class="ti ti-chevron-down"></i>
              </button>
              <div class="step-original">${step.original||''}</div>
            </div>
            <div class="step-card-back">
              <div class="back-title">
                <button class="flip-btn" style="width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border-med);display:flex;align-items:center;justify-content:center;background:var(--bg2);" onclick="flipCard(${idx})"><i class="ti ti-x" style="font-size:12px;color:var(--muted)"></i></button>
                <span style="margin-left:8px">this step</span>
              </div>
              ${ingRows}
            </div>
          </div>
        </div>`;
      }).join('');

      showTab('recipe');
      document.getElementById('recipe-screen').scrollTop = 0;
      if (document.getElementById('go-btn')) document.getElementById('go-btn').disabled = false;
    }

    function toggleStep(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    function flipCard(idx) {
      const inner = document.getElementById('card-inner-' + idx);
      if (inner) inner.classList.toggle('flipped');
    }

    function toggleIngredients() {
      const hdr = document.getElementById('ing-header');
      const list = document.getElementById('ing-list');
      hdr.classList.toggle('open');
      list.classList.toggle('open');
      hdr.querySelector('span').textContent = hdr.classList.contains('open') ? 'hide ingredients' : 'show ingredients';
    }

    function goHome() {
      hideError();
      showTab('home');
    }



    // ── current recipe ───────────────────────────────────────────────────────
    let currentRecipe = null;

    // ── aisle lookup ─────────────────────────────────────────────────────────
    const AISLE_MAP = {
      // Produce
      garlic:1, onion:1, shallot:1, scallion:1, "green onion":1, tomato:1, lemon:1, lime:1, orange:1,
      spinach:1, basil:1, parsley:1, cilantro:1, thyme:1, rosemary:1, sage:1, oregano:1, mint:1,
      potato:1, "sweet potato":1, carrot:1, celery:1, mushroom:1, pepper:1, zucchini:1, eggplant:1,
      broccoli:1, cauliflower:1, kale:1, lettuce:1, arugula:1, avocado:1, cucumber:1, corn:1,
      ginger:1, jalapeño:1, jalapeño:1, apple:1, banana:1, berry:1, strawberry:1, blueberry:1,
      // Dairy
      butter:2, milk:2, cream:2, "heavy cream":2, "sour cream":2, "cream cheese":2,
      mozzarella:2, parmesan:2, cheddar:2, ricotta:2, "cottage cheese":2, "goat cheese":2,
      egg:2, eggs:2, yogurt:2, "half and half":2, "whipping cream":2,
      // Meat & Seafood
      chicken:3, beef:3, pork:3, lamb:3, turkey:3, bacon:3, sausage:3, "ground beef":3,
      salmon:3, shrimp:3, tuna:3, cod:3, tilapia:3, anchovy:3, pancetta:3, prosciutto:3,
      // Pantry
      flour:4, sugar:4, "brown sugar":4, "powdered sugar":4, salt:4, pepper:4, "black pepper":4,
      oil:4, "olive oil":4, "vegetable oil":4, "coconut oil":4, "sesame oil":4,
      vinegar:4, "balsamic vinegar":4, "apple cider vinegar":4, "rice vinegar":4,
      "soy sauce":4, "fish sauce":4, "worcestershire sauce":4, "hot sauce":4,
      "tomato paste":4, "tomato sauce":4, "crushed tomatoes":4, "diced tomatoes":4,
      pasta:4, rice:4, quinoa:4, oats:4, breadcrumbs:4, cornmeal:4, cornstarch:4,
      "baking soda":4, "baking powder":4, "vanilla extract":4, yeast:4,
      honey:4, "maple syrup":4, "cocoa powder":4, chocolate:4, "chocolate chips":4,
      "chicken broth":4, "beef broth":4, "vegetable broth":4, stock:4,
      tahini:4, "peanut butter":4, "almond butter":4, jam:4,
      "canned beans":4, "black beans":4, chickpeas:4, lentils:4,
      // Spices
      cinnamon:5, cumin:5, paprika:5, turmeric:5, "chili powder":5, "cayenne pepper":5,
      "red pepper flakes":5, "italian seasoning":5, "garlic powder":5, "onion powder":5,
      "dried oregano":5, "dried thyme":5, "dried basil":5, nutmeg:5, cardamom:5,
      "bay leaf":5, "bay leaves":5, cloves:5, "allspice":5, "curry powder":5,
      gochujang:5, "miso paste":5, "sriracha":5, harissa:5,
      // Bakery/Bread
      bread:6, "sandwich bread":6, baguette:6, tortilla:6, "pita bread":6, naan:6, roll:6,
      // Frozen
      "frozen peas":7, "frozen corn":7, "frozen spinach":7, "ice cream":7,
      // Canned/Jarred
      "pizza sauce":8, "pasta sauce":8, "marinara":8, "alfredo sauce":8,
      capers:8, olives:8, "sun-dried tomatoes":8, "roasted peppers":8,
    };

    const AISLE_NAMES = {
      1: "🥦 Produce",
      2: "🧀 Dairy & Eggs",
      3: "🥩 Meat & Seafood",
      4: "🫙 Pantry",
      5: "🌶️ Spices & Condiments",
      6: "🍞 Bakery & Bread",
      7: "🧊 Frozen",
      8: "🥫 Canned & Jarred",
      9: "🛒 Other",
    };

    const categoryCache = JSON.parse(localStorage.getItem('oe_cat_cache') || '{}');

    function normalizeIngredient(name) {
      return name.toLowerCase()
        .replace(/,.*$/, '')
        .replace(/\(.*?\)/g, '')
        .replace(/(fresh|dried|chopped|minced|sliced|diced|grated|shredded|cooked|uncooked|whole|large|small|medium|extra|lean|boneless|skinless|unsalted|salted|softened|melted|room temperature|divided|optional)/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function lookupCategory(name) {
      const norm = normalizeIngredient(name);
      // exact match
      if (AISLE_MAP[norm] !== undefined) return AISLE_MAP[norm];
      // partial match
      for (const [key, val] of Object.entries(AISLE_MAP)) {
        if (norm.includes(key) || key.includes(norm)) return val;
      }
      return 9; // Other
    }

    async function categorizeUnknowns(items) {
      const unknown = items.filter(i => {
        const norm = normalizeIngredient(i.name);
        return categoryCache[norm] === undefined && lookupCategory(i.name) === 9;
      });
      if (unknown.length === 0) return;

      const names = unknown.map(i => normalizeIngredient(i.name));
      const prompt = `Categorize each ingredient into exactly one of these grocery store aisle numbers:
1=Produce, 2=Dairy & Eggs, 3=Meat & Seafood, 4=Pantry/Dry Goods, 5=Spices & Condiments, 6=Bakery, 7=Frozen, 8=Canned & Jarred, 9=Other

Ingredients: ${names.join(", ")}

Respond ONLY with valid JSON object mapping each ingredient name to its aisle number. Example: {"garlic": 1, "mozzarella": 2}`;

      try {
        const res = await fetch(WORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: names.join(", "), prompt })
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { return; }
        const result = data.recipe || data;
        for (const [name, cat] of Object.entries(result)) {
          categoryCache[name] = cat;
        }
        localStorage.setItem('oe_cat_cache', JSON.stringify(categoryCache));
      } catch { }
    }

    // ── shopping list ─────────────────────────────────────────────────────────
    let shopItems = JSON.parse(localStorage.getItem('oe_shop') || '[]');

    function saveShopItems() {
      localStorage.setItem('oe_shop', JSON.stringify(shopItems));
    }

    function openShopFromRecipe() {
      if (!currentRecipe || !currentRecipe.ingredients) return;
      const existing = shopItems.map(i => i.name.toLowerCase());
      const toAdd = currentRecipe.ingredients
        .filter(i => !existing.includes(i.name.toLowerCase()))
        .map(i => ({ name: i.name, qty: i.qty, checked: false, cat: lookupCategory(i.name) }));
      shopItems = [...shopItems, ...toAdd];
      saveShopItems();
      categorizeUnknowns(toAdd).then(() => { saveShopItems(); renderShop(); });
      renderShop();
      openShop();
    }

    function openShop() {
      showTab('shop');
    }

    function closeShop() {
      showTab('home');
    }

    function renderShop() {
      const el = document.getElementById('shop-content');
      if (shopItems.length === 0) {
        el.innerHTML = `<div class="shop-empty"><i class="ti ti-shopping-cart" aria-hidden="true"></i>your shopping list is empty.<br>add ingredients from a recipe.</div>`;
        return;
      }
      const byCat = {};
      for (const item of shopItems) {
        const cat = categoryCache[normalizeIngredient(item.name)] || item.cat || 9;
        if (!byCat[cat]) byCat[cat] = [];
        byCat[cat].push(item);
      }
      const sortedCats = Object.keys(byCat).map(Number).sort((a,b) => a-b);
      el.innerHTML = sortedCats.map(cat => {
        const items = byCat[cat];
        const rows = items.map(item => `
          <div class="shop-item ${item.checked ? 'checked' : ''}" onclick="toggleShopItem('${item.name.replace(/'/g,"\'")}')">
            <div class="shop-check"></div>
            <span class="shop-item-name">${item.name}</span>
            <span style="font-size:11px;color:var(--muted)">${item.qty||''}</span>
          </div>`).join('');
        return `<div class="aisle-group"><div class="aisle-label">${AISLE_NAMES[cat]||'Other'}</div>${rows}</div>`;
      }).join('');
    }

    function toggleShopItem(name) {
      const item = shopItems.find(i => i.name === name);
      if (item) { item.checked = !item.checked; saveShopItems(); renderShop(); }
    }

    function clearChecked() {
      shopItems = shopItems.filter(i => !i.checked);
      saveShopItems();
      renderShop();
    }

    function clearAll() {
      shopItems = [];
      saveShopItems();
      renderShop();
    }

    // ── saved recipes ─────────────────────────────────────────────────────────
    function getSavedRecipes() {
      return JSON.parse(localStorage.getItem('oe_saved') || '[]');
    }

    function saveSavedRecipes(list) {
      localStorage.setItem('oe_saved', JSON.stringify(list));
    }

    function toggleSave() {
      if (!currentRecipe) return;
      let saved = getSavedRecipes();
      const idx = saved.findIndex(r => r.title === currentRecipe.title);
      if (idx === -1) {
        saved.unshift({ ...currentRecipe, savedAt: Date.now() });
        document.getElementById('save-btn').className = 'action-btn saved';
        document.getElementById('save-btn').innerHTML = '<i class="ti ti-bookmark"></i> saved';
      } else {
        saved.splice(idx, 1);
        document.getElementById('save-btn').className = 'action-btn';
        document.getElementById('save-btn').innerHTML = '<i class="ti ti-bookmark"></i> save recipe';
      }
      saveSavedRecipes(saved);
    }

    function openSaved() {
      showTab('saved');
    }

    function closeSaved() {
      showTab('home');
    }

    function renderSaved() {
      const saved = getSavedRecipes();
      const el = document.getElementById('saved-cards');
      if (saved.length === 0) {
        el.innerHTML = `<div class="saved-empty"><i class="ti ti-bookmark" aria-hidden="true"></i>no saved recipes yet.<br>save a recipe while viewing it.</div>`;
        return;
      }
      el.innerHTML = saved.map((r, idx) => `
        <div class="saved-card">
          <div class="saved-card-info" onclick="loadSaved(${idx})">
            <strong>${r.title}</strong>
            <span>${r.yield||''} ${r.time ? '· ' + r.time : ''}</span>
          </div>
          <button class="saved-card-del" onclick="deleteSaved(${idx})" aria-label="delete"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>`).join('');
    }

    function loadSaved(idx) {
      const saved = getSavedRecipes();
      closeSaved();
      renderRecipe(saved[idx], 'saved');
    }

    function deleteSaved(idx) {
      const saved = getSavedRecipes();
      saved.splice(idx, 1);
      saveSavedRecipes(saved);
      renderSaved();
    }

    // ── cook mode ─────────────────────────────────────────────────────────────
    let cookSteps = [];
    let cookIdx = 0;

    function startCookMode() {
      if (!currentRecipe || !currentRecipe.steps || currentRecipe.steps.length === 0) return;
      cookSteps = currentRecipe.steps;
      cookIdx = 0;
      document.getElementById('cook-screen').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      pushState('cook');
      renderCookStep();
    }

    function closeCookMode() {
      document.getElementById('cook-screen').style.display = 'none';
      document.body.style.overflow = '';
    }

        function renderCookStep() {
      const step = cookSteps[cookIdx];
      const total = cookSteps.length;
      document.getElementById('cook-step-label').textContent = 'step ' + (cookIdx + 1) + ' of ' + total;

      const tags = '';

      // extract only orange measure-tagged words from step brief
      const cookMeasureMatches = [...(step.brief||'').matchAll(/<span class="measure">([^<]+)<\/span>/g)];
      const cookMeasureText = cookMeasureMatches.map(m => m[1].toLowerCase()).join(' ');
      const cookMeasureWords = cookMeasureText.split(/[\s,.()\/]+/).filter(w => w.length >= 3);
      const stepIngs = cookMeasureWords.length > 0 && currentRecipe && currentRecipe.ingredients
        ? currentRecipe.ingredients.filter(i => {
            const name = i.name.toLowerCase()
              .replace(/,.*$/, '')
              .replace(/\(.*?\)/g,'')
              .replace(/\b(fresh|dried|chopped|minced|sliced|diced|grated|shredded|cooked|uncooked|whole|large|small|medium|extra|lean|boneless|skinless|unsalted|salted|softened|melted|divided|optional|virgin|store-bought|instant|active|dry|granulated|powdered|packed|pure|light|dark|unbleached|all-purpose)\b/g,'')
              .replace(/\s+/g,' ').trim();
            const ingWords = name.split(/\s+/).filter(w => w.length >= 3);
            return ingWords.some(w => cookMeasureWords.some(mw => mw.includes(w) || w.includes(mw)));
          })
        : [];
            // build cook card as flip structure
      const cookIngRows = stepIngs.map(i =>
        '<div style="display:flex;gap:10px;font-size:14px;padding:6px 0;border-bottom:0.5px solid var(--border);">' +
        '<span style="color:var(--measure);font-weight:500;min-width:80px;flex-shrink:0">' + (i.qty||'') + '</span>' +
        '<span style="color:var(--shell)">' + i.name + '</span></div>'
      ).join('');

      document.getElementById('cook-body').innerHTML =
        // front face
        '<div id="cook-card-inner" style="position:relative;transform-style:preserve-3d;transition:transform 0.45s ease;min-height:200px;">' +
          // front
          '<div style="backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:0.5px solid var(--border);border-radius:18px;overflow:hidden;">' +
            '<div style="padding:15px 17px;">' +
              '<div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;">' +
                (stepIngs.length > 0
                  ? '<button onclick="event.stopPropagation();toggleCookFlip()" style="width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border-med);display:flex;align-items:center;justify-content:center;background:var(--bg2);cursor:pointer;flex-shrink:0;"><i class=\"ti ti-scale\" style=\"font-size:14px;color:var(--measure)\"></i></button>'
                  : '') +
                '<span style="margin-left:auto">step ' + (cookIdx+1) + ' of ' + total + '</span>' +
              '</div>' +
              '<div class="step-brief" style="font-size:22px;line-height:1.6;">' + (step.brief||'') + '</div>' +
              (tags ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:20px;">' + tags + '</div>' : '') +
            '</div>' +
            '<button onclick="event.stopPropagation();toggleCookOriginal()" style="width:100%;background:var(--bg2);border:none;border-top:0.5px solid var(--border);padding:10px 17px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:sans-serif;font-size:12px;color:var(--muted);">' +
              '<span>original notes</span><i class="ti ti-chevron-down" id="cook-orig-chevron" style="font-size:14px;transition:transform 0.2s"></i>' +
            '</button>' +
            '<div id="cook-orig-drawer" style="display:none;padding:13px 17px 15px;font-size:13px;line-height:1.72;color:var(--muted);background:var(--bg2);font-style:italic;border-top:0.5px solid var(--border);">' +
              (step.original||'') +
            '</div>' +
          '</div>' +
          // back
          (stepIngs.length > 0
            ? '<div style="position:absolute;inset:0;transform:rotateY(180deg);backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:15px 17px;overflow-y:auto;">' +
                '<div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;">' +
                  '<button onclick="event.stopPropagation();toggleCookFlip()" style="width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border-med);display:flex;align-items:center;justify-content:center;background:var(--bg2);cursor:pointer;flex-shrink:0;"><i class=\"ti ti-x\" style=\"font-size:12px;color:var(--muted)\"></i></button>' +
                  '<span>this step</span>' +
                '</div>' +
                cookIngRows +
              '</div>'
            : '') +
        '</div>' +
        '<div style="margin-top:16px;font-size:12px;color:var(--muted);text-align:center;">tap to advance</div>';

      // clear drawers div since we no longer use it
      document.getElementById('cook-drawers').innerHTML = '';
      document.getElementById('cook-dots').innerHTML = cookSteps.map((_, i) =>
        '<div style="width:' + (i === cookIdx ? '18' : '6') + 'px;height:6px;border-radius:3px;background:' + (i === cookIdx ? 'var(--yolk)' : 'var(--border-med)') + ';transition:all 0.2s"></div>'
      ).join('');

      document.getElementById('cook-prev').style.opacity = cookIdx === 0 ? '0.3' : '1';
      document.getElementById('cook-next').innerHTML = cookIdx === total - 1
        ? '<i class="ti ti-check"></i>'
        : '<i class="ti ti-arrow-right"></i>';
    }

    function cookBodyTap(e) {
      if (e.target.closest('button')) return;
      cookNext();
    }

    function toggleCookFlip() {
      const inner = document.getElementById('cook-card-inner');
      if (inner) inner.classList.toggle('flipped');
    }

    function toggleCookOriginal() {
      const drawer = document.getElementById('cook-orig-drawer');
      const chevron = document.getElementById('cook-orig-chevron');
      if (!drawer) return;
      const open = drawer.style.display !== 'none';
      drawer.style.display = open ? 'none' : 'block';
      chevron.style.transform = open ? '' : 'rotate(180deg)';
    }

    function cookNext() {
      if (cookIdx < cookSteps.length - 1) { cookIdx++; renderCookStep(); }
      else closeCookMode();
    }

    function cookPrev() {
      if (cookIdx > 0) { cookIdx--; renderCookStep(); }
    }

    // ── history / back button ────────────────────────────────────────────────
    function pushState(name) {
      history.pushState({ overlay: name }, '');
    }

    window.addEventListener('popstate', function(e) {
      const cookOpen = document.getElementById('cook-screen').style.display !== 'none';
      if (cookOpen) { closeCookMode(); return; }
      if (document.getElementById('recipe-screen').classList.contains('active')) {
        goHome(); return;
      }
      showTab('home');
    });

    // ── tab nav ───────────────────────────────────────────────────────────────
    function showTab(tab) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      // hide all main screens
      ['home-screen','recipe-screen','loading-screen','shop-screen','saved-screen'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      if (tab === 'home') {
        document.getElementById('nav-home').classList.add('active');
        document.getElementById('home-screen').classList.add('active');
      } else if (tab === 'saved') {
        document.getElementById('nav-saved').classList.add('active');
        document.getElementById('saved-screen').classList.add('active');
        renderSaved();
      } else if (tab === 'shop') {
        document.getElementById('nav-shop').classList.add('active');
        document.getElementById('shop-screen').classList.add('active');
        renderShop();
      } else if (tab === 'recipe') {
        document.getElementById('nav-home').classList.add('active');
        document.getElementById('recipe-screen').classList.add('active');
        // ensure ing-list open state is preserved
        const ingList = document.getElementById('ing-list');
        if (ingList && ingList.classList.contains('open')) {
          ingList.style.display = 'block';
        }
      }
    }
  </script>
</body>
</html>
